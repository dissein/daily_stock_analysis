name: Morning Stock Analysis

on:
  schedule:
    # 调整为北京时间 08:45 运行
    - cron: '45 0 * * 1-5'
  workflow_dispatch: 

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
          MARKET_REVIEW_ENABLED: ${{ secrets.MARKET_REVIEW_ENABLED }}
          MARKET_REVIEW_REGION: ${{ secrets.MARKET_REVIEW_REGION }}
          # 明确当前运行目录
          PYTHONPATH: .
        run: python main.py
